name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" <<'REMOTE'
            set -euo pipefail
            cd /opt/courses-shop/app
            git fetch origin main
            git reset --hard origin/main
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml build --no-cache app
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml up -d db
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml run --rm app npm run prisma:migrate:deploy
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml up -d --force-recreate app caddy
            sudo docker image prune -f
          REMOTE

      - name: Smoke test production
        run: |
          set -euo pipefail

          for path in \
            /pl \
            /en \
            /de \
            /pl/kursy \
            /pl/pakiety \
            /pl/kategorie \
            /pl/regulamin \
            /pl/polityka-prywatnosci \
            /en/terms \
            /en/privacy-policy \
            /de/agb \
            /de/datenschutz \
            /robots.txt \
            /sitemap.xml; do
            status="$(curl -L -s -o /dev/null -w '%{http_code}' "https://rafalpodraza.com${path}")"
            if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
              echo "Smoke test failed for ${path}: HTTP ${status}"
              exit 1
            fi
          done

          legal_page="$(curl -fsSL https://rafalpodraza.com/pl/regulamin)"
          if ! grep -Fq "Regulamin sklepu" <<< "$legal_page"; then
            echo "Smoke test failed: legal page content is missing"
            exit 1
          fi

          home_page="$(curl -fsSL https://rafalpodraza.com/pl)"
          for expected in \
            "https://www.youtube.com/@RafalPodraza" \
            "https://www.linkedin.com/in/rafalpodraza" \
            "https://www.facebook.com/technikaprogramowania"; do
            if ! grep -Fq "$expected" <<< "$home_page"; then
              echo "Smoke test failed: missing footer link ${expected}"
              exit 1
            fi
          done
